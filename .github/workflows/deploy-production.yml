# Deploy PRODUCTION only → https://believeinunity.org (separate cPanel from 501c3ers.com)
# Development uses deploy.yml → 501c3ers.com on branch `development`.
#
# Runs on self-hosted VPS runner (believe-vps) — localhost SSH bypasses CSF blocks on GitHub-hosted IPs.
# Required secret: CPANEL_SSH_KEY_PRODUCTION (private key for PRODUCTION_DEPLOY_USER@host)
# Required variables: PRODUCTION_DEPLOY_HOST, PRODUCTION_DEPLOY_USER, PRODUCTION_DEPLOY_PATH, PRODUCTION_APP_URL
name: Deploy production (believeinunity.org)

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, believe-vps]

    env:
      PHP_VERSION: '8.4'
      NODE_VERSION: '20'
      DEPLOY_HOST: ${{ vars.PRODUCTION_DEPLOY_HOST }}
      SSH_CONNECT_HOST: ${{ vars.PRODUCTION_SSH_HOST != '' && vars.PRODUCTION_SSH_HOST || '72.60.226.88' }}
      DEPLOY_USER: ${{ vars.PRODUCTION_DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.PRODUCTION_DEPLOY_PATH }}
      APP_URL: ${{ vars.PRODUCTION_APP_URL }}
      SSH_PORT: ${{ vars.PRODUCTION_SSH_PORT != '' && vars.PRODUCTION_SSH_PORT || '22' }}
      SSH_MAX_ATTEMPTS: 10
      SSH_RETRY_SLEEP: 8
      SSH_USE_TCP_PROBE: false
      SSH_USE_DEPLOY_HOST: true
      SSH_SELF_HOSTED: true
      SERVER_INNER_KEY: /home/believeinunity/.local/share/.gconf/deploy_key
      RSYNC_EXCLUDES: >-
        --exclude=.git/
        --exclude=.github/
        --exclude=node_modules/
        --exclude=tests/
        --exclude=storage/
        --exclude=storage_old/
        --exclude=.env
        --exclude=.env.*
        --exclude=.htaccess
        --exclude=docs/
        --exclude=deploy/
        --exclude=*.md
        --exclude=CLAUDE.md
        --exclude=COMMAND_IN_PRODUCTION.md
        --exclude=phpunit.xml
        --exclude=.phpunit.cache/
        --exclude=.editorconfig
        --exclude=.prettierrc
        --exclude=.prettierignore
        --exclude=eslint.config.js
        --exclude=.gitattributes
        --exclude=.gitignore
        --exclude=Homestead.yaml
        --exclude=Homestead.json
        --exclude=tsconfig.json
        --exclude=components.json
        --exclude=package.json
        --exclude=package-lock.json
        --exclude=vite.config.ts
        --exclude=.ssh-deploy/
        --exclude=.ssh-deploy-prod/
        --exclude=.fleet/
        --exclude=.idea/
        --exclude=.vscode/
        --exclude=.nova/
        --exclude=.zed/
        --exclude=*.zip
        --exclude=auth.json

    steps:
      - uses: actions/checkout@v4

      - name: Deploy target
        run: |
          set -euo pipefail
          for v in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH APP_URL; do
            if [ -z "${!v}" ]; then
              echo "::error::Set GitHub variable PRODUCTION_${v#DEPLOY_} (or PRODUCTION_APP_URL for APP_URL)."
              exit 1
            fi
          done
          echo "Environment: production (believeinunity.org)"
          echo "Target: ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
          echo "Runner: self-hosted believe-vps (localhost SSH)"
          echo "APP_URL (build only): ${APP_URL}"
          if echo "${DEPLOY_HOST}" | grep -qi '501c3ers'; then
            echo "::error::Production workflow must not target 501c3ers.com (development server)."
            exit 1
          fi

      - name: Verify deploy secrets
        run: |
          if [ -z "${{ secrets.CPANEL_SSH_KEY_PRODUCTION }}" ]; then
            echo "::error::Missing GitHub secret CPANEL_SSH_KEY_PRODUCTION."
            exit 1
          fi
          echo "Using self-hosted VPS runner (believe-vps) for production deploy."

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_KEY_PRODUCTION }}
          SSH_DIR: ${{ github.workspace }}/.ssh-deploy-prod
          DEPLOY_USER: ${{ env.DEPLOY_USER }}
          DEPLOY_HOST: ${{ env.DEPLOY_HOST }}
          SSH_CONNECT_HOST: ${{ env.SSH_CONNECT_HOST }}
          SSH_PORT: ${{ env.SSH_PORT }}
          SSH_MAX_ATTEMPTS: ${{ env.SSH_MAX_ATTEMPTS }}
          SSH_RETRY_SLEEP: ${{ env.SSH_RETRY_SLEEP }}
          SSH_USE_TCP_PROBE: ${{ env.SSH_USE_TCP_PROBE }}
          SSH_USE_DEPLOY_HOST: ${{ env.SSH_USE_DEPLOY_HOST }}
          SSH_SELF_HOSTED: ${{ env.SSH_SELF_HOSTED }}
          SERVER_INNER_KEY: ${{ env.SERVER_INNER_KEY }}
          APP_URL: ${{ env.APP_URL }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/setup-cpanel-ssh.sh
          bash .github/scripts/setup-cpanel-ssh.sh

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache
          key: ${{ runner.os }}-php${{ env.PHP_VERSION }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ env.PHP_VERSION }}-composer-

      - name: Prepare build tools (self-hosted VPS)
        run: |
          set -euo pipefail
          php --version | grep -E '^PHP 8\.(3|4)\.' || { echo "::error::PHP 8.3+ required on VPS"; exit 1; }
          mkdir -p "${HOME}/bin"
          if ! command -v composer >/dev/null 2>&1; then
            curl -fsSL https://getcomposer.org/download/latest-stable/composer.phar -o "${HOME}/bin/composer.phar"
            printf '%s\n' '#!/usr/bin/env bash' 'exec php "${HOME}/bin/composer.phar" "$@"' > "${HOME}/bin/composer"
            chmod +x "${HOME}/bin/composer"
          fi
          echo "${HOME}/bin" >> "${GITHUB_PATH}"
          export NVM_DIR="${HOME}/.nvm"
          if [ ! -s "${NVM_DIR}/nvm.sh" ]; then
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
          fi
          # shellcheck disable=SC1090
          . "${NVM_DIR}/nvm.sh"
          nvm install "${NODE_VERSION}"
          nvm use "${NODE_VERSION}"
          echo "NVM_DIR=${NVM_DIR}" >> "${GITHUB_ENV}"
          node --version
          npm --version
          composer --version

      - name: Install PHP dependencies
        run: |
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --no-ansi --ignore-platform-req=ext-sodium
          mkdir -p resources/views storage/framework/views

      - name: Load Vite env from server (match local build)
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy "grep -E '^(APP_NAME|APP_URL|APP_VERSION)=|^REVERB_|^VITE_' '${DEPLOY_PATH}/.env' | grep -v '^#'" > .env.server
          echo "Loaded $(wc -l < .env.server | tr -d ' ') lines from server .env"
          grep -c '^REVERB_APP_KEY=' .env.server || echo "::warning::REVERB_APP_KEY not in fetched .env.server"
          chmod +x .github/scripts/expand-vite-env.sh
          {
            ./.github/scripts/expand-vite-env.sh < .env.server | grep -v '^APP_URL='
            echo "APP_URL=${APP_URL}"
          } > .env
          lines=$(wc -l < .env | tr -d ' ')
          echo "Wrote .env for Vite build (${lines} lines)"
          grep -E '^VITE_REVERB_|^APP_' .env | sed 's/=.*$/=***/' || true
          grep -q '^VITE_REVERB_APP_KEY=.\+' .env || { echo "::error::VITE_REVERB_APP_KEY empty after resolve"; exit 1; }

      - name: Build frontend assets
        if: hashFiles('package.json') != ''
        env:
          APP_URL: ${{ env.APP_URL }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          . "${NVM_DIR}/nvm.sh"
          nvm use "${NODE_VERSION}"
          npm ci --legacy-peer-deps --no-audit --no-fund
          npm run build
          test -f public/build/manifest.json || (echo "::error::public/build/manifest.json missing" && exit 1)

      - name: Verify server paths (storage, .env, .htaccess)
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy bash -s <<REMOTE
          set -e
          for f in storage .env .htaccess public/.htaccess; do
            test -e "${DEPLOY_PATH}/\$f" || { echo "::error::Missing ${DEPLOY_PATH}/\$f on server"; exit 1; }
          done
          echo "Server storage, .env, and .htaccess files present — will not be overwritten."
          REMOTE

      - name: Deploy with rsync
        run: |
          set -euo pipefail
          rsync -avz --delete \
            -e "${RSYNC_RSH}" \
            ${RSYNC_EXCLUDES} \
            --exclude=vendor/ \
            ./ cpanel-deploy:${DEPLOY_PATH}/
          rsync -avz --delete \
            -e "${RSYNC_RSH}" \
            ./vendor/ cpanel-deploy:${DEPLOY_PATH}/vendor/
          ${SSH_CMD} cpanel-deploy "test -f ${DEPLOY_PATH}/public/build/manifest.json && ls -la ${DEPLOY_PATH}/public/build/manifest.json | head -1"

      - name: Prune non-runtime files on server
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy bash -s <<REMOTE
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          rm -rf docs tests node_modules deploy .ssh-deploy .ssh-deploy-prod .phpunit.cache bootstrap/ssr 2>/dev/null || true
          rm -f CLAUDE.md README.md COMMAND_IN_PRODUCTION.md phpunit.xml .editorconfig eslint.config.js .prettierignore .prettierrc .gitattributes .gitignore Homestead.yaml Homestead.json tsconfig.json components.json package.json package-lock.json vite.config.ts 2>/dev/null || true
          rm -f .env.backup .env.before-sync .env.production .env.backup- 2>/dev/null || true
          rm -f resources/js/components/wallet/*.md resources/js/components/merchant/README.md 2>/dev/null || true
          echo PRUNE_OK
          REMOTE

      - name: Post-deploy (artisan on server only)
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy bash -s <<REMOTE
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          mkdir -p storage/app/public storage/framework/{sessions,views,cache/data} storage/logs
          chmod -R 775 storage bootstrap/cache 2>/dev/null || true
          chmod -R 755 public/build 2>/dev/null || true
          rm -rf vendor/laravel/sail vendor/laravel/pint vendor/laravel/pail vendor/nunomaduro/collision vendor/symfony/yaml 2>/dev/null || true
          timeout 300 php artisan migrate --force -v || {
            echo "::warning::migrate exceeded 5m or failed; check migrate:status on server"
            php artisan migrate:status 2>&1 | tail -20
            exit 1
          }
          php artisan seo:optimize-share-images || echo "::warning::seo:optimize-share-images failed (non-fatal)"
          php artisan storage:link --force
          php artisan config:cache
          php artisan event:cache
          php artisan view:cache
          php artisan route:cache
          # EA-Nginx proxy cache breaks Inertia (JSON without X-Inertia header). Keep disabled on prod.
          uapi NginxCaching disable_cache 2>/dev/null || true
          uapi NginxCaching clear_cache 2>/dev/null || true
          test -f .env && test -d storage && test -f .htaccess && echo DEPLOY_OK
          REMOTE

      - name: Smoke test (production URL only)
        env:
          SMOKE_URL: ${{ vars.PRODUCTION_APP_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SMOKE_URL}" ]; then
            echo "::error::Set GitHub variable PRODUCTION_APP_URL=https://believeinunity.org"
            exit 1
          fi
          if echo "${SMOKE_URL}" | grep -qi '501c3ers'; then
            echo "::error::Production smoke test must not use 501c3ers.com (check PRODUCTION_APP_URL variable)"
            exit 1
          fi
          ok=0
          for attempt in 1 2 3; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 60 "${SMOKE_URL}/" || echo "000")
            echo "GET ${SMOKE_URL}/ => HTTP ${code} (attempt ${attempt}/3)"
            if [ "${code}" = "200" ] || [ "${code}" = "302" ]; then
              ok=1
              break
            fi
            sleep 15
          done
          test "${ok}" = "1" || { echo "::error::Homepage smoke test failed after 3 attempts"; exit 1; }
