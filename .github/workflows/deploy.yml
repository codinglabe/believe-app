# Deploy DEVELOPMENT only → https://501c3ers.com (c3ers@501c3ers.com)
# PRODUCTION https://believeinunity.org is NOT deployed by this workflow.
#
# Dev login landing: code is host-gated (501c3ers.com only). Production deploys are unaffected.
# Post-deploy always syncs PRODUCTION_APP_URL + DEVELOPMENT_HOSTS into server .env — do not remove.
#
# Preserves on server: storage/, .env, .htaccess. Never uploads local storage/ or .env.
# Optional repository variables: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, APP_URL, SSH_PORT,
#   SSH_HOST (IPv4 for SSH — default 72.60.226.88), SSH_IPV6_HOST, PRODUCTION_APP_URL, DEVELOPMENT_HOSTS
name: Deploy development (501c3ers.com)

on:
  push:
    branches: [development]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-development
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PHP_VERSION: '8.4'
      NODE_VERSION: '20'
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST != '' && vars.DEPLOY_HOST || '501c3ers.com' }}
      # GitHub runners often fail 501c3ers.com over broken IPv6 — connect via VPS IPv4 first.
      SSH_CONNECT_HOST: ${{ vars.SSH_HOST != '' && vars.SSH_HOST || '72.60.226.88' }}
      SSH_IPV6_HOST: ${{ vars.SSH_IPV6_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER != '' && vars.DEPLOY_USER || 'c3ers' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH != '' && vars.DEPLOY_PATH || '/home/c3ers/public_html' }}
      APP_URL: ${{ vars.APP_URL != '' && vars.APP_URL || 'https://501c3ers.com' }}
      PRODUCTION_APP_URL: ${{ vars.PRODUCTION_APP_URL != '' && vars.PRODUCTION_APP_URL || 'https://believeinunity.org' }}
      DEVELOPMENT_HOSTS: ${{ vars.DEVELOPMENT_HOSTS != '' && vars.DEVELOPMENT_HOSTS || '501c3ers.com,www.501c3ers.com' }}
      SSH_PORT: ${{ vars.SSH_PORT != '' && vars.SSH_PORT || '22' }}
      RSYNC_EXCLUDES: >-
        --exclude=.git/
        --exclude=.github/
        --exclude=node_modules/
        --exclude=tests/
        --exclude=storage/
        --exclude=.env
        --exclude=.env.*
        --exclude=.htaccess
        --exclude=docs/
        --exclude=deploy/
        --exclude=*.md
        --exclude=CLAUDE.md
        --exclude=COMMAND_IN_PRODUCTION.md
        --exclude=phpunit.xml
        --exclude=.phpunit.cache/
        --exclude=.editorconfig
        --exclude=.prettierrc
        --exclude=.prettierignore
        --exclude=eslint.config.js
        --exclude=.gitattributes
        --exclude=.gitignore
        --exclude=Homestead.yaml
        --exclude=Homestead.json
        --exclude=tsconfig.json
        --exclude=components.json
        --exclude=package.json
        --exclude=package-lock.json
        --exclude=vite.config.ts
        --exclude=.ssh-deploy/
        --exclude=.ssh-deploy-prod/
        --exclude=.fleet/
        --exclude=.idea/
        --exclude=.vscode/
        --exclude=.nova/
        --exclude=.zed/
        --exclude=*.zip
        --exclude=auth.json

    steps:
      - uses: actions/checkout@v4

      - name: Deploy target
        run: |
          echo "Environment: development (501c3ers.com)"
          echo "Target: ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
          echo "SSH connect host: ${SSH_CONNECT_HOST}"
          if [ -n "${SSH_IPV6_HOST:-}" ]; then
            echo "SSH IPv6 fallback: ${SSH_IPV6_HOST}"
          fi
          echo "APP_URL (build only): ${APP_URL}"
          echo "PRODUCTION_APP_URL (server .env): ${PRODUCTION_APP_URL}"
          echo "DEVELOPMENT_HOSTS (server .env): ${DEVELOPMENT_HOSTS}"
          if echo "${DEPLOY_HOST}" | grep -qi 'believeinunity'; then
            echo "::error::Refusing to deploy to production host. Use 501c3ers.com for development only."
            exit 1
          fi

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          SSH_DIR: ${{ github.workspace }}/.ssh-deploy
        run: |
          set -euo pipefail
          chmod +x .github/scripts/setup-cpanel-ssh.sh
          .github/scripts/setup-cpanel-ssh.sh

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache
          key: ${{ runner.os }}-php${{ env.PHP_VERSION }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ env.PHP_VERSION }}-composer-

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          extensions: mbstring, intl, bcmath, ctype, curl, dom, fileinfo, json, openssl, pdo, pdo_mysql, tokenizer, xml

      - name: Install PHP dependencies
        run: |
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --no-ansi
          mkdir -p resources/views storage/framework/views

      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # Vite cannot expand ${REVERB_APP_KEY} — resolve literals from server .env.
      - name: Load Vite env from server (match local build)
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy "grep -E '^(APP_NAME|APP_URL|APP_VERSION)=|^REVERB_|^VITE_' '${DEPLOY_PATH}/.env' | grep -v '^#'" > .env.server
          echo "Loaded $(wc -l < .env.server | tr -d ' ') lines from server .env"
          grep -c '^REVERB_APP_KEY=' .env.server || echo "::warning::REVERB_APP_KEY not in fetched .env.server"
          chmod +x .github/scripts/expand-vite-env.sh
          {
            echo "APP_URL=${APP_URL}"
            ./.github/scripts/expand-vite-env.sh < .env.server
          } > .env
          lines=$(wc -l < .env | tr -d ' ')
          echo "Wrote .env for Vite build (${lines} lines)"
          grep -E '^VITE_REVERB_|^APP_' .env | sed 's/=.*$/=***/' || true
          grep -q '^VITE_REVERB_APP_KEY=.\+' .env || { echo "::error::VITE_REVERB_APP_KEY empty after resolve"; exit 1; }

      - name: Build frontend assets
        if: hashFiles('package.json') != ''
        env:
          APP_URL: ${{ env.APP_URL }}
        run: |
          npm ci --legacy-peer-deps --no-audit --no-fund
          npm run build
          test -f public/build/manifest.json || (echo "::error::public/build/manifest.json missing" && exit 1)

      - name: Verify server paths (storage, .env, .htaccess)
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy bash -s <<REMOTE
          set -e
          for f in storage .env .htaccess public/.htaccess; do
            test -e "${DEPLOY_PATH}/\$f" || { echo "::error::Missing ${DEPLOY_PATH}/\$f on server"; exit 1; }
          done
          echo "Server storage, .env, and .htaccess files present — will not be overwritten."
          REMOTE

      - name: Deploy with rsync
        run: |
          set -euo pipefail
          # App + assets (with --delete). Vendor synced separately without --delete for speed.
          rsync -avz --delete \
            -e "${RSYNC_RSH}" \
            ${RSYNC_EXCLUDES} \
            --exclude=vendor/ \
            ./ cpanel-deploy:${DEPLOY_PATH}/
          rsync -avz --delete \
            -e "${RSYNC_RSH}" \
            ./vendor/ cpanel-deploy:${DEPLOY_PATH}/vendor/
          ${SSH_CMD} cpanel-deploy "test -f ${DEPLOY_PATH}/public/build/manifest.json && ls -la ${DEPLOY_PATH}/public/build/manifest.json | head -1"

      - name: Prune non-runtime files on server
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy bash -s <<REMOTE
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          rm -rf docs tests node_modules deploy .ssh-deploy .ssh-deploy-prod .phpunit.cache bootstrap/ssr 2>/dev/null || true
          rm -f CLAUDE.md README.md COMMAND_IN_PRODUCTION.md phpunit.xml .editorconfig eslint.config.js .prettierignore .prettierrc .gitattributes .gitignore Homestead.yaml Homestead.json tsconfig.json components.json package.json package-lock.json vite.config.ts 2>/dev/null || true
          rm -f .env.backup .env.before-sync .env.production .env.backup- 2>/dev/null || true
          rm -f resources/js/components/wallet/*.md resources/js/components/merchant/README.md 2>/dev/null || true
          echo PRUNE_OK
          REMOTE

      - name: Post-deploy (artisan on server only)
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy bash -s <<REMOTE
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          mkdir -p storage/app/public storage/framework/{sessions,views,cache/data} storage/logs
          chmod -R 775 storage bootstrap/cache 2>/dev/null || true
          chmod -R 755 public/build 2>/dev/null || true
          chmod +x scripts/sync-server-env-keys.sh 2>/dev/null || true
          bash scripts/sync-server-env-keys.sh .env \
            "PRODUCTION_APP_URL=${PRODUCTION_APP_URL}" \
            "DEVELOPMENT_HOSTS=${DEVELOPMENT_HOSTS}"
          rm -rf vendor/laravel/sail vendor/laravel/pint vendor/laravel/pail vendor/nunomaduro/collision vendor/symfony/yaml 2>/dev/null || true
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          php artisan cache:clear
          php artisan migrate --force
          php artisan storage:link --force
          php artisan config:cache
          php artisan view:cache
          # cPanel docroot is public_html; Vite assets are under public/build — nginx needs /build at account root.
          ln -sfn public/build build
          # Do not route:cache — duplicate route names can break serialization on the server.
          test -f .env && test -d storage && test -f .htaccess && echo DEPLOY_OK
          REMOTE

      - name: Smoke test
        run: |
          set -euo pipefail
          ok=0
          for attempt in 1 2 3; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 60 "${APP_URL}/" || echo "000")
            echo "GET ${APP_URL}/ => HTTP ${code} (attempt ${attempt}/3)"
            if [ "${code}" = "200" ] || [ "${code}" = "302" ]; then
              ok=1
              break
            fi
            sleep 15
          done
          test "${ok}" = "1" || { echo "::error::Homepage smoke test failed after 3 attempts"; exit 1; }
