# Deploy DEVELOPMENT only → https://501c3ers.com (c3ers@501c3ers.com)
# Production uses deploy-production.yml → believeinunity.org on branch `production`.
#
# Runs on self-hosted runner believe-vps (local SSH to c3ers@127.0.0.1 — no CSF/firewall issues).
# Required variables: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, APP_URL
name: Deploy development (501c3ers.com)

on:
  push:
    branches: [development]
  workflow_dispatch:

concurrency:
  group: deploy-development-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, believe-vps]

    env:
      PHP_VERSION: '8.4'
      NODE_VERSION: '24'
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      # GitHub runners must use VPS IPv4 — hostname/IPv6 often time out from Azure datacenters.
      SSH_CONNECT_HOST: ${{ vars.SSH_HOST != '' && vars.SSH_HOST || '72.60.226.88' }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      APP_URL: ${{ vars.APP_URL }}
      PRODUCTION_APP_URL: ${{ vars.PRODUCTION_APP_URL != '' && vars.PRODUCTION_APP_URL || 'https://believeinunity.org' }}
      DEVELOPMENT_HOSTS: ${{ vars.DEVELOPMENT_HOSTS != '' && vars.DEVELOPMENT_HOSTS || '501c3ers.com,www.501c3ers.com' }}
      WEBRTC_TURN_PUBLIC_IP: ${{ vars.WEBRTC_TURN_PUBLIC_IP != '' && vars.WEBRTC_TURN_PUBLIC_IP || '72.60.226.88' }}
      WEBRTC_TURN_URL: ${{ vars.WEBRTC_TURN_URL != '' && vars.WEBRTC_TURN_URL || 'turn:72.60.226.88:3478,turn:501c3ers.com:3478,turns:501c3ers.com:5349?transport=tcp' }}
      WEBRTC_TURN_USERNAME: ${{ vars.WEBRTC_TURN_USERNAME != '' && vars.WEBRTC_TURN_USERNAME || 'believe501c3' }}
      WEBRTC_TURN_CREDENTIAL: ${{ secrets.WEBRTC_TURN_CREDENTIAL }}
      WEBRTC_TURN_API_KEY: ''
      WEBRTC_USE_THIRD_PARTY_TURN: 'false'
      SSH_PORT: ${{ vars.SSH_PORT != '' && vars.SSH_PORT || '22' }}
      SSH_MAX_ATTEMPTS: 10
      SSH_RETRY_SLEEP: 8
      SSH_USE_TCP_PROBE: false
      SSH_USE_DEPLOY_HOST: true
      RSYNC_EXCLUDES: >-
        --exclude=.git/
        --exclude=.github/
        --exclude=node_modules/
        --exclude=tests/
        --exclude=storage/
        --exclude=.env
        --exclude=.env.*
        --exclude=.htaccess
        --exclude=docs/
        --exclude=deploy/
        --exclude=forgestack/
        --exclude=/build/
        --exclude=resources/js/
        --exclude=*.md
        --exclude=CLAUDE.md
        --exclude=COMMAND_IN_PRODUCTION.md
        --exclude=phpunit.xml
        --exclude=.phpunit.cache/
        --exclude=.editorconfig
        --exclude=.prettierrc
        --exclude=.prettierignore
        --exclude=eslint.config.js
        --exclude=.gitattributes
        --exclude=.gitignore
        --exclude=Homestead.yaml
        --exclude=Homestead.json
        --exclude=tsconfig.json
        --exclude=components.json
        --exclude=package.json
        --exclude=package-lock.json
        --exclude=vite.config.ts
        --exclude=.ssh-deploy/
        --exclude=.ssh-deploy-prod/
        --exclude=.fleet/
        --exclude=.idea/
        --exclude=.vscode/
        --exclude=.nova/
        --exclude=.zed/
        --exclude=*.zip
        --exclude=auth.json

    steps:
      # Self-hosted: skip actions/checkout (re-downloads repo from GitHub ~3–6 min).
      # Uses a persistent bare mirror on the VPS instead (~5–20 s).
      - name: Checkout (fast self-hosted mirror)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          chmod +x "${HOME}/bin/checkout-self-hosted.sh" 2>/dev/null || true
          if [ -x "${HOME}/bin/checkout-self-hosted.sh" ]; then
            bash "${HOME}/bin/checkout-self-hosted.sh"
          else
            MIRROR="${HOME}/.cache/believe-app-mirror.git"
            REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            mkdir -p "$(dirname "${MIRROR}")" "${GITHUB_WORKSPACE}"
            if [ ! -d "${MIRROR}/objects" ]; then
              git init --bare "${MIRROR}"
              git -C "${MIRROR}" remote add origin "${REPO_URL}"
            else
              git -C "${MIRROR}" remote set-url origin "${REPO_URL}"
            fi
            git -C "${MIRROR}" fetch --depth=1 --no-tags origin "${GITHUB_SHA}"
            shopt -s dotglob nullglob
            for item in "${GITHUB_WORKSPACE}"/* "${GITHUB_WORKSPACE}"/.[!.]* "${GITHUB_WORKSPACE}"/..?*; do
              [ -e "${item}" ] || continue
              rm -rf "${item}"
            done
            git -C "${MIRROR}" archive "${GITHUB_SHA}" | tar -x -C "${GITHUB_WORKSPACE}"
            echo "Checkout OK (inline bootstrap)"
          fi

      - name: Deploy target
        run: |
          set -euo pipefail
          for v in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH APP_URL; do
            if [ -z "${!v}" ]; then
              echo "::error::Set GitHub variable ${v} (Settings -> Secrets and variables -> Actions -> Variables)."
              exit 1
            fi
          done
          echo "Environment: development (501c3ers.com)"
          echo "Target: ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
          echo "SSH connect host: ${SSH_CONNECT_HOST}"
          echo "APP_URL (build only): ${APP_URL}"
          if echo "${DEPLOY_HOST}" | grep -qi 'believeinunity'; then
            echo "::error::Development workflow must not target believeinunity.org (production server)."
            exit 1
          fi

      - name: Setup SSH
        env:
          SSH_SELF_HOSTED: 'true'
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_KEY_PRODUCTION }}
          SSH_DIR: ${{ github.workspace }}/.ssh-deploy
          DEPLOY_USER: ${{ env.DEPLOY_USER }}
          DEPLOY_HOST: ${{ env.DEPLOY_HOST }}
          SSH_CONNECT_HOST: ${{ env.SSH_CONNECT_HOST }}
          SSH_PORT: ${{ env.SSH_PORT }}
          SSH_MAX_ATTEMPTS: ${{ env.SSH_MAX_ATTEMPTS }}
          SSH_RETRY_SLEEP: ${{ env.SSH_RETRY_SLEEP }}
          SSH_USE_TCP_PROBE: ${{ env.SSH_USE_TCP_PROBE }}
          SSH_USE_DEPLOY_HOST: ${{ env.SSH_USE_DEPLOY_HOST }}
          APP_URL: ${{ env.APP_URL }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/setup-cpanel-ssh.sh
          bash .github/scripts/setup-cpanel-ssh.sh

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache
          key: ${{ runner.os }}-php${{ env.PHP_VERSION }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ env.PHP_VERSION }}-composer-

      - name: Prepare build tools (self-hosted VPS)
        run: |
          set -euo pipefail
          php --version | grep -E '^PHP 8\.(3|4)\.' || { echo "::error::PHP 8.3+ required on VPS"; exit 1; }
          mkdir -p "${HOME}/bin"
          if ! command -v composer >/dev/null 2>&1; then
            curl -fsSL https://getcomposer.org/download/latest-stable/composer.phar -o "${HOME}/bin/composer.phar"
            printf '%s\n' '#!/usr/bin/env bash' 'exec php "${HOME}/bin/composer.phar" "$@"' > "${HOME}/bin/composer"
            chmod +x "${HOME}/bin/composer"
          fi
          export PATH="${HOME}/bin:${PATH}"
          if ! command -v node >/dev/null 2>&1 || ! node --version | grep -qE '^v(20|22|24)\.'; then
            export NVM_DIR="${HOME}/.nvm"
            if [ ! -s "${NVM_DIR}/nvm.sh" ]; then
              curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
            fi
            # shellcheck source=/dev/null
            . "${NVM_DIR}/nvm.sh"
            nvm install 24
            nvm use 24
          fi
          echo "${HOME}/bin" >> "${GITHUB_PATH}"
          if [ -s "${HOME}/.nvm/nvm.sh" ]; then
            echo "NVM_DIR=${HOME}/.nvm" >> "${GITHUB_ENV}"
          fi
          composer --version
          node --version
          npm --version

      - name: Install PHP dependencies
        run: |
          export PATH="${HOME}/bin:${PATH}"
          if [ -s "${HOME}/.nvm/nvm.sh" ]; then . "${HOME}/.nvm/nvm.sh"; fi
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --no-ansi --ignore-platform-req=ext-sodium
          mkdir -p resources/views storage/framework/views

      - name: Load Vite env from server (match local build)
        if: hashFiles('package.json') != ''
        run: |
          set -euo pipefail
          if [ -s "${HOME}/.nvm/nvm.sh" ]; then . "${HOME}/.nvm/nvm.sh"; fi
          ${SSH_CMD} cpanel-deploy "grep -E '^(APP_NAME|APP_URL|APP_VERSION)=|^REVERB_|^VITE_' '${DEPLOY_PATH}/.env' | grep -v '^#'" > .env.server
          echo "Loaded $(wc -l < .env.server | tr -d ' ') lines from server .env"
          grep -c '^REVERB_APP_KEY=' .env.server || echo "::warning::REVERB_APP_KEY not in fetched .env.server"
          chmod +x .github/scripts/expand-vite-env.sh
          {
            ./.github/scripts/expand-vite-env.sh < .env.server | grep -v '^APP_URL='
            echo "APP_URL=${APP_URL}"
          } > .env
          lines=$(wc -l < .env | tr -d ' ')
          echo "Wrote .env for Vite build (${lines} lines)"
          grep -E '^VITE_REVERB_|^APP_' .env | sed 's/=.*$/=***/' || true
          grep -q '^VITE_REVERB_APP_KEY=.\+' .env || { echo "::error::VITE_REVERB_APP_KEY empty after resolve"; exit 1; }

      - name: Build frontend assets
        if: hashFiles('package.json') != ''
        env:
          APP_URL: ${{ env.APP_URL }}
        run: |
          set -euo pipefail
          if [ -s "${HOME}/.nvm/nvm.sh" ]; then . "${HOME}/.nvm/nvm.sh"; fi
          npm ci --legacy-peer-deps --no-audit --no-fund
          npm run build
          test -f public/build/manifest.json || (echo "::error::public/build/manifest.json missing" && exit 1)

      - name: Verify server paths (storage, .env, .htaccess)
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy bash -s <<REMOTE
          set -e
          for f in storage .env .htaccess public/.htaccess; do
            test -e "${DEPLOY_PATH}/\$f" || { echo "::error::Missing ${DEPLOY_PATH}/\$f on server"; exit 1; }
          done
          echo "Server storage, .env, and .htaccess files present — will not be overwritten."
          REMOTE

      - name: Deploy with rsync
        run: |
          set -euo pipefail
          rsync -avz --delete \
            -e "${RSYNC_RSH}" \
            ${RSYNC_EXCLUDES} \
            --exclude=vendor/ \
            ./ cpanel-deploy:${DEPLOY_PATH}/
          rsync -avz --delete \
            -e "${RSYNC_RSH}" \
            ./vendor/ cpanel-deploy:${DEPLOY_PATH}/vendor/
          ${SSH_CMD} cpanel-deploy "test -f ${DEPLOY_PATH}/public/build/manifest.json && ls -la ${DEPLOY_PATH}/public/build/manifest.json | head -1"

      - name: Prune non-runtime files on server
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy bash -s <<REMOTE
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          rm -rf docs tests node_modules deploy forgestack build storage_old .ssh-deploy .ssh-deploy-prod .phpunit.cache bootstrap/ssr resources/js 2>/dev/null || true
          rm -f CLAUDE.md README.md COMMAND_IN_PRODUCTION.md phpunit.xml .editorconfig eslint.config.js .prettierignore .prettierrc .gitattributes .gitignore Homestead.yaml Homestead.json tsconfig.json components.json package.json package-lock.json vite.config.ts .nvmrc .forgestack.json .env.example 2>/dev/null || true
          rm -f .env.backup .env.before-sync .env.production .env.before-reverb-fix .env.backup-* .env.backup.* 2>/dev/null || true
          rm -f scripts/allow-github-actions-csf.sh scripts/allow-runner-ip.sh scripts/check-node-version.mjs scripts/install-coturn-vps.sh scripts/install-local-ssh-key-on-vps.sh scripts/setup-cpanel-deploy-ssh-access.sh scripts/setup-local-ssh.ps1 scripts/stamp-pwa-version.mjs 2>/dev/null || true
          echo PRUNE_OK
          REMOTE

      - name: Post-deploy (artisan on server only)
        run: |
          set -euo pipefail
          ${SSH_CMD} cpanel-deploy bash -s <<REMOTE
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          mkdir -p storage/app/public storage/framework/{sessions,views,cache/data} storage/logs
          chmod -R 775 storage bootstrap/cache 2>/dev/null || true
          chmod -R 755 public/build 2>/dev/null || true
          chmod +x scripts/sync-server-env-keys.sh 2>/dev/null || true
          bash scripts/sync-server-env-keys.sh .env \
            "PRODUCTION_APP_URL=${PRODUCTION_APP_URL}" \
            "DEVELOPMENT_HOSTS=${DEVELOPMENT_HOSTS}" \
            "WEBRTC_TURN_PUBLIC_IP=${WEBRTC_TURN_PUBLIC_IP}" \
            "WEBRTC_TURN_URL=${WEBRTC_TURN_URL}" \
            "WEBRTC_TURN_USERNAME=${WEBRTC_TURN_USERNAME}" \
            "WEBRTC_TURN_CREDENTIAL=${WEBRTC_TURN_CREDENTIAL}" \
            "WEBRTC_TURN_API_KEY=${WEBRTC_TURN_API_KEY}" \
            "WEBRTC_USE_THIRD_PARTY_TURN=${WEBRTC_USE_THIRD_PARTY_TURN}"
          php artisan cache:forget webrtc:ice_servers:v1 2>/dev/null || true
          rm -rf vendor/laravel/sail vendor/laravel/pint vendor/laravel/pail vendor/nunomaduro/collision vendor/symfony/yaml 2>/dev/null || true
          timeout 300 php artisan migrate --force -v || {
            echo "::warning::migrate exceeded 5m or failed; check migrate:status on server"
            php artisan migrate:status 2>&1 | tail -20
            exit 1
          }
          php artisan storage:link --force
          php artisan config:cache
          php artisan view:cache
          rm -rf build 2>/dev/null || true
          ln -sfn public/build build
          test -L build && test -d public/build/assets
          test -f .env && test -d storage && test -f .htaccess && echo DEPLOY_OK
          REMOTE

      - name: Smoke test (development URL only)
        env:
          SMOKE_URL: ${{ vars.APP_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SMOKE_URL}" ]; then
            echo "::error::Set GitHub variable APP_URL=https://501c3ers.com"
            exit 1
          fi
          if echo "${SMOKE_URL}" | grep -qi 'believeinunity'; then
            echo "::error::Development smoke test must not use believeinunity.org (check APP_URL variable)"
            exit 1
          fi
          ok=0
          for attempt in 1 2 3; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 60 "${SMOKE_URL}/" || echo "000")
            echo "GET ${SMOKE_URL}/ => HTTP ${code} (attempt ${attempt}/3)"
            if [ "${code}" = "200" ] || [ "${code}" = "302" ]; then
              ok=1
              break
            fi
            sleep 15
          done
          test "${ok}" = "1" || { echo "::error::Homepage smoke test failed after 3 attempts"; exit 1; }
