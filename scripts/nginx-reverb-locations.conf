# Laravel Reverb WebSocket proxy — include inside the HTTPS server {} for believeinunity.org
# (cPanel: MultiPHP INI / Apache includes, or nginx userdata custom config).
#
# Requires: php artisan reverb:start (Supervisor) listening on 127.0.0.1:8080
# .env: REVERB_SERVER_HOST=127.0.0.1 REVERB_SERVER_PORT=8080
#       REVERB_HOST=believeinunity.org REVERB_PORT=443 REVERB_SCHEME=https
#       BROADCAST_CONNECTION=reverb

location /app {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
}

location /apps {
    proxy_pass http://127.0.0.1:8080;
