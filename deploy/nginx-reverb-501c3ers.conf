# Laravel Reverb WebSocket proxy for 501c3ers.com (EA-Nginx / cPanel)
# Install as root (once):
#   mkdir -p /etc/nginx/conf.d/users/c3ers/501c3ers.com
#   cp nginx-reverb-501c3ers.conf /etc/nginx/conf.d/users/c3ers/501c3ers.com/reverb.conf
#   nginx -t && systemctl reload nginx

location /app {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Scheme $scheme;
    proxy_set_header SERVER_PORT $server_port;
    proxy_set_header REMOTE_ADDR $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_read_timeout 86400;
    proxy_pass http://127.0.0.1:8080;
}

location /apps {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://127.0.0.1:8080;
}
